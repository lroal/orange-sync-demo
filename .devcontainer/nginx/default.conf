map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream vite {
  server app:5173;
}

upstream backend {
  server app:3055;
}

server {
  listen 8080;
  server_name _;

  brotli on;
  brotli_comp_level 5;
  brotli_min_length 1024;
  brotli_types
    application/javascript
    application/json
    application/wasm
    application/xml
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;

  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_vary on;
  gzip_types
    application/javascript
    application/json
    application/wasm
    application/xml
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  location /api/ {
    proxy_pass http://backend;
  }

  location /rdb {
    proxy_pass http://backend;
  }

  location /health {
    proxy_pass http://backend;
  }

  location / {
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_pass http://vite;
  }
}
